<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Atelier · PixAI 素材庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   🎨 主題色（使用者指定五色）
   c1 #809bce 主藍 / c2 #95b8d1 淺藍 / c3 #b8e0d2 薄荷
   c4 #d6eadf 淡薄荷 / c5 #eac4d5 粉
============================================================ */
:root{
  --c1:#809bce; --c2:#95b8d1; --c3:#b8e0d2; --c4:#d6eadf; --c5:#eac4d5;
  --c1-deep:#5F7DB5;
  --bg:#F7F9F8;
  --surface:#FFFFFF;
  --ink:#3E4A5E;
  --muted:#8A94A6;
  --line:#E1E8E4;
  --code-bg:#F0F5F2;
  --code-ink:#5A6678;
  --radius:14px;
  --dot-char:var(--c5);
  --dot-outfit:var(--c1);
  --dot-act:var(--c2);
  --dot-scene:var(--c3);
  --dot-cam:#B9C4D6;
  --dot-art:#C3B4D4;
  --band-ink:#F4F8F6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  font-size:15px;line-height:1.6;
}
button{font-family:inherit}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace}

/* ============ 頂部色帶 ============ */
#band{
  background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 100%);
  color:var(--band-ink);
  position:sticky;top:0;z-index:30;
}
#band .brandrow{
  max-width:1240px;margin:0 auto;
  display:flex;align-items:center;gap:14px;
  padding:14px 20px 6px;
}
#band h1{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;letter-spacing:.08em}
#band .eyebrow{
  font-family:"JetBrains Mono",monospace;font-style:italic;
  font-size:11px;letter-spacing:.22em;opacity:.85;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#band .bandbtn{
  border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.14);
  color:var(--band-ink);border-radius:999px;padding:5px 14px;font-size:12.5px;
  cursor:pointer;flex:0 0 auto;backdrop-filter:blur(4px);
}
#band .bandbtn:hover{background:rgba(255,255,255,.26)}
/* 大類 tabs（底線式） */
#groupbar{
  max-width:1240px;margin:0 auto;
  display:flex;gap:2px;overflow-x:auto;padding:2px 12px 0;scrollbar-width:none;
}
#groupbar::-webkit-scrollbar{display:none}
.gtab{
  flex:0 0 auto;padding:9px 15px 11px;font-size:13.5px;letter-spacing:.1em;
  color:rgba(247,250,249,.78);cursor:pointer;position:relative;user-select:none;
  transition:color .15s;
}
.gtab:hover{color:#fff}
.gtab.on{color:#fff;font-weight:500}
.gtab.on::after{
  content:"";position:absolute;left:14px;right:14px;bottom:0;height:3px;
  background:var(--c5);border-radius:3px 3px 0 0;
}

/* ============ 搜尋列 ============ */
#searchrow{
  max-width:1240px;margin:0 auto;padding:14px 20px 0;
  display:flex;gap:10px;align-items:center;
}
.searchbox{position:relative;flex:1;max-width:520px}
.searchbox input{
  width:100%;padding:9px 38px 9px 15px;
  border:1px solid var(--line);border-radius:999px;
  background:var(--surface);color:var(--ink);font-size:14px;outline:none;font-family:inherit;
  transition:border-color .15s, box-shadow .15s;
}
.searchbox input:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(128,155,206,.15)}
.searchbox .icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* ============ 主佈局 ============ */
#wrap{max-width:1240px;margin:0 auto;display:flex;align-items:flex-start;gap:22px;padding:16px 20px 80px}
/* 左側分類欄（桌面） */
#sidebar{
  flex:0 0 208px;position:sticky;top:96px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 0 8px;max-height:calc(100vh - 120px);overflow-y:auto;
}
#sidebar .sb-title{
  font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.3em;
  color:var(--c1-deep);padding:0 18px 10px;border-bottom:1px solid var(--line);margin-bottom:6px;
}
.sb-group{padding:9px 18px 3px;font-size:11px;letter-spacing:.16em;color:var(--muted)}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 18px;font-size:13.5px;cursor:pointer;color:var(--ink);
  border-left:3px solid transparent;transition:background .12s;
}
.sb-item:hover{background:var(--c4)}
.sb-item.on{background:var(--c4);border-left-color:var(--c1);font-weight:500}
.sb-item .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.sb-item .n{margin-left:auto;font-size:11px;color:var(--muted);font-family:"JetBrains Mono",monospace}
/* 手機用細分類 chips */
#catbar{display:none;gap:8px;overflow-x:auto;padding:10px 16px 2px;scrollbar-width:none}
#catbar::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;display:flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);font-size:12.5px;color:var(--ink);cursor:pointer;
}
.chip .dot{width:6px;height:6px;border-radius:50%}
.chip.on{background:var(--c1);border-color:var(--c1);color:#fff}
.chip.on .dot{background:#fff!important}

/* ============ 卡片列表 ============ */
main{flex:1;min-width:0}
.count{font-size:12px;color:var(--muted);margin:2px 2px 12px;letter-spacing:.08em;font-family:"JetBrains Mono",monospace}
#list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:13px 14px;transition:box-shadow .15s;
}
.card:hover{box-shadow:0 3px 14px rgba(128,155,206,.10)}
.card .hd{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.card h3{font-size:14.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .catlab{font-size:10.5px;color:var(--muted);flex:0 0 auto}
.badge-custom{font-size:10px;background:var(--c5);color:#7A4A60;border-radius:5px;padding:1px 6px;flex:0 0 auto}
.iconbtn{
  flex:0 0 auto;width:30px;height:30px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;color:var(--muted);transition:all .15s;
}
.iconbtn:active{transform:scale(.9)}
.iconbtn.faved{color:#D9A441;border-color:#E7C88C;background:#FDF8EE}
.iconbtn.added{background:var(--c1);border-color:var(--c1);color:#fff}
.card .body{display:flex;gap:10px;margin-top:9px;align-items:stretch}
.prompt{
  flex:1;min-width:0;background:var(--code-bg);border-radius:9px;
  padding:9px 11px;font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;
  font-size:11.5px;line-height:1.6;color:var(--code-ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  cursor:pointer;word-break:break-word;
}
.card.open .prompt{-webkit-line-clamp:unset}
.thumb{
  flex:0 0 66px;width:66px;border-radius:9px;object-fit:cover;
  border:1px solid var(--line);cursor:zoom-in;display:none;
}
.thumb.loaded{display:block}
.note{margin-top:7px;font-size:12px;color:var(--muted);line-height:1.5}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:52px 0;font-size:14px}

/* ============ 浮動組合按鈕 ============ */
#comfab{
  position:fixed;right:20px;bottom:24px;z-index:44;
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--c1);color:#fff;font-size:22px;cursor:pointer;
  box-shadow:0 6px 18px rgba(128,155,206,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
#comfab:hover{transform:scale(1.06)}
#comfab .nbadge{
  position:absolute;top:-4px;right:-4px;min-width:21px;height:21px;
  background:var(--c5);color:#7A4A60;border-radius:999px;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;
}

/* ============ 右側組合抽屜 ============ */
#drawermask{position:fixed;inset:0;background:rgba(62,74,94,.28);z-index:45;opacity:0;pointer-events:none;transition:opacity .22s}
#drawermask.show{opacity:1;pointer-events:auto}
#drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:50;
  width:min(380px,92vw);background:var(--bg);
  border-left:1px solid var(--line);
  transform:translateX(105%);transition:transform .28s cubic-bezier(.3,.8,.3,1);
  display:flex;flex-direction:column;
  box-shadow:-8px 0 30px rgba(62,74,94,.12);
}
#drawer.show{transform:translateX(0)}
#drawer .dw-head{
  background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;
  padding:16px 18px 13px;display:flex;align-items:center;gap:10px;flex:0 0 auto;
}
#drawer .dw-head h2{font-family:"Noto Serif TC",serif;font-size:16.5px;flex:1;letter-spacing:.06em}
#drawer .dw-head button{background:none;border:none;color:rgba(255,255,255,.9);cursor:pointer;font-size:12.5px;padding:4px 6px}
#drawer .dw-body{overflow-y:auto;padding:14px 18px 20px;flex:1}
.dw-sec{
  font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.24em;
  color:var(--c1-deep);margin:16px 0 8px;
}
.dw-sec:first-child{margin-top:2px}
.subjrow{display:flex;gap:7px;flex-wrap:wrap}
.subj{
  padding:5px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);font-size:12.5px;cursor:pointer;color:var(--ink);
}
.subj.on{background:var(--c1);border-color:var(--c1);color:#fff}
#randbtn{
  width:100%;padding:11px;border-radius:11px;border:1px dashed var(--c1);
  background:var(--c4);color:var(--c1-deep);font-size:13.5px;font-weight:500;cursor:pointer;
  transition:background .15s;
}
#randbtn:hover{background:var(--c3)}
.randhint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.fbar{display:flex;gap:6px;align-items:center;margin:0 0 7px}
.fbar button{
  border:none;background:none;cursor:pointer;padding:2px 4px;
  font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;
  color:var(--c1-deep);text-decoration:underline dotted;text-underline-offset:3px;
}
.fbar button:hover{color:var(--ink)}
.fbar .fcount{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted)}
.filterrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fchip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);font-size:11.5px;cursor:pointer;color:var(--muted);
  transition:background .12s,border-color .12s,color .12s;user-select:none;
}
.fchip .fpx{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.04em}
.fchip:hover{border-color:var(--c2)}
.fchip.on{background:var(--c4);border-color:var(--c1);color:var(--ink)}
.fchip.on .fpx{color:var(--c1-deep)}
#customtxt{
  width:100%;border:1px solid var(--line);border-radius:10px;background:var(--surface);
  padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;resize:vertical;min-height:42px;
}
#customtxt:focus{border-color:var(--c1)}
.railwrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 12px}
.railitem{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
.railitem:last-child{border-bottom:none}
.railitem .ord{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);width:15px;text-align:right;flex:0 0 auto}
.lockbtn{
  width:18px;height:18px;flex:0 0 auto;cursor:pointer;
  border:1.5px solid var(--line);border-radius:5px;background:var(--surface);
  padding:0;font-size:10px;line-height:1;display:inline-flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s;
}
.lockbtn:hover{border-color:var(--c1)}
.lockbtn.locked{background:var(--c4);border-color:var(--c1)}
.railitem.locked .rt{color:var(--c1-deep)}
.railitem .dot{width:6px;height:6px}
.railitem .rt{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.railitem .rbtn{border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 4px;flex:0 0 auto}
.railitem .rbtn:hover{color:var(--c1-deep)}
.railempty{font-size:12.5px;color:var(--muted);text-align:center;padding:14px 0}
#preview{
  background:var(--code-bg);border-radius:10px;padding:11px 13px;
  font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;
  font-size:11px;line-height:1.7;color:var(--code-ink);
  max-height:200px;overflow-y:auto;word-break:break-word;white-space:pre-wrap;
}
#copyall{
  width:100%;margin-top:12px;padding:13px;border-radius:12px;border:none;
  background:var(--c1);color:#fff;font-size:14.5px;font-weight:600;
  cursor:pointer;letter-spacing:.08em;
}
#copyall:hover{background:var(--c1-deep)}

/* ============ 新增 Prompt 對話框 ============ */
#addmask{position:fixed;inset:0;background:rgba(62,74,94,.32);z-index:55;display:none;align-items:center;justify-content:center;padding:18px}
#addmask.show{display:flex}
#adddlg{
  background:var(--bg);border-radius:18px;width:min(480px,100%);
  max-height:88vh;overflow-y:auto;padding:22px 22px 20px;
}
#adddlg h2{font-family:"Noto Serif TC",serif;font-size:17px;margin-bottom:4px}
#adddlg .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
#adddlg label{display:block;font-size:12px;color:var(--c1-deep);letter-spacing:.1em;margin:12px 0 5px}
#adddlg select,#adddlg input,#adddlg textarea{
  width:100%;border:1px solid var(--line);border-radius:10px;background:var(--surface);
  padding:9px 12px;font-size:13.5px;font-family:inherit;color:var(--ink);outline:none;
}
#adddlg select:focus,#adddlg input:focus,#adddlg textarea:focus{border-color:var(--c1)}
#adddlg textarea{resize:vertical;min-height:70px}
#addcode{
  margin-top:12px;background:var(--code-bg);border-radius:10px;padding:10px 12px;
  font-family:"JetBrains Mono",monospace;font-size:10.5px;line-height:1.6;color:var(--code-ink);
  word-break:break-all;display:none;
}
#adddlg .row{display:flex;gap:10px;margin-top:16px}
#adddlg .row button{
  flex:1;padding:11px;border-radius:11px;font-size:14px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);
}
#adddlg .row button.primary{background:var(--c1);border-color:var(--c1);color:#fff;font-weight:600}

/* ============ 燈箱 ============ */
#lightbox{position:fixed;inset:0;background:rgba(40,48,62,.85);z-index:60;display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
#lightbox.show{display:flex}
#lightbox img{max-width:100%;max-height:100%;border-radius:12px}

/* ============ Toast ============ */
#toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#fff;font-size:13px;padding:8px 18px;border-radius:999px;
  opacity:0;pointer-events:none;transition:all .25s;z-index:70;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============ RWD ============ */
@media(max-width:900px){
  #sidebar{display:none}
  #catbar{display:flex}
  #wrap{padding:8px 16px 90px;gap:0}
  #list{grid-template-columns:1fr}
  #searchrow{padding:12px 16px 0}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="band">
  <div class="brandrow">
    <h1>Prompt 素材庫</h1>
    <span class="eyebrow">The Atelier — Prompt Collection</span>
    <button class="bandbtn" id="openAdd">＋ 新增</button>
  </div>
  <nav id="groupbar"></nav>
</div>

<div id="searchrow">
  <div class="searchbox">
    <input id="q" type="search" placeholder="搜尋中英文關鍵字（旗袍 / cheongsam / 回眸…）">
    <span class="icon">⌕</span>
  </div>
</div>

<nav id="catbar"></nav>

<div id="wrap">
  <aside id="sidebar"></aside>
  <main>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </main>
</div>

<button id="comfab" title="組合工作檯">🧺<span class="nbadge" id="comcount">0</span></button>

<div id="drawermask"></div>
<aside id="drawer">
  <div class="dw-head">
    <h2>組合工作檯</h2>
    <button id="clearAll">清空</button>
    <button id="closeDrawer" style="font-size:16px">✕</button>
  </div>
  <div class="dw-body">
    <div class="dw-sec">SUBJECT · 主體</div>
    <div class="subjrow" id="subjrow"></div>

    <div class="dw-sec">RANDOM · 隨機抽取（先選類別）</div>
    <div class="fbar">
      <button data-fq="default">預設</button>
      <button data-fq="all">全開</button>
      <button data-fq="none">全關</button>
      <span class="fcount" id="fcount"></span>
    </div>
    <div class="filterrow" id="filterrow"></div>
    <button id="randbtn">🎲 隨機抽一套</button>
    <div class="randhint">上方選好要抽的分類後按抽取；結果左側的小框點一下 🔒 即鎖定，再抽時該項會保留不動。雙人主體時「姿勢P」自動改抽「雙人C」；版面D與地點L互斥、套裝與上下裝擇一，同開請留意。</div>

    <div class="dw-sec">CHARACTER · 自訂人物描述</div>
    <textarea id="customtxt" placeholder="例：silver hair, red eyes, tall man…（會插在主體之後）"></textarea>

    <div class="dw-sec">MODULES · 已選模組（自動排序）</div>
    <div class="railwrap" id="rail"></div>

    <div class="dw-sec">PREVIEW · 完整 Prompt</div>
    <div id="preview"></div>
    <button id="copyall">複製完整 Prompt</button>
  </div>
</aside>

<div id="addmask">
  <div id="adddlg">
    <h2>新增 Prompt</h2>
    <div class="sub">會暫存在此瀏覽器；若要永久保存，複製下方程式碼貼進 HTML 的資料區。</div>
    <label>分類</label>
    <select id="ad-cat"></select>
    <label>標題（建議格式：代號＋空格＋中文，例 F31 露背晚裝）</label>
    <input id="ad-title" placeholder="F31 露背晚裝">
    <label>英文 Prompt</label>
    <textarea id="ad-prompt" placeholder="backless evening dress, ..."></textarea>
    <label>備註（選填）</label>
    <input id="ad-note" placeholder="分支或使用技巧">
    <div id="addcode" class="mono"></div>
    <div class="row">
      <button id="ad-cancel">取消</button>
      <button id="ad-copy" style="display:none">複製程式碼</button>
      <button class="primary" id="ad-save">加入</button>
    </div>
  </div>
</div>

<div id="lightbox"><img id="lightimg" alt=""></div>
<div id="toast"></div>

<script>
/* ============================================================
   ⚙️ 設定
   📚 Prompt 資料已拆分至 js/data/（頁面底部載入）
   🖼️ 參考圖：把圖片放進 IMG_DIR 資料夾，檔名 = 標題開頭代號
      例：images/F4.png → 顯示在「F4 中式旗袍」旁
      支援副檔名見 IMG_EXTS，依序嘗試；縮圖採延遲載入
============================================================ */
const IMG_DIR = "images/";
const IMG_EXTS = ["png","jpg","jpeg","webp"];

/* 分類定義：o = 組合排序權重（小→大 = prompt 前→後） */
const CATS = {

const GROUPS = [
  {id:"all",   l:"全部"},
  {id:"fav",   l:"⭐ 收藏"},
  {id:"char",  l:"人物特徵"},
  {id:"outfit",l:"服飾"},
  {id:"act",   l:"表情動作"},
  {id:"scene", l:"場景氛圍"},
  {id:"cam",   l:"鏡頭"},
  {id:"art",   l:"畫風版面"},
];
const SUBJECTS = ["1girl","1boy","1boy, 1girl, couple","2girls","2boys","無主體"];
/* 隨機抽取的預設類別；couple 主體時以 couple 取代 pose */
const RAND_CATS = ["hair","haircolor","eyes","expression","gaze","pose","camera","location","element","lighting","style"];
/* 各分類代號前綴（篩選 chip 顯示用） */
const CAT_PREFIX = {
  layout:"D",chibi:"Q",hair:"H",haircolor:"HC",eyes:"EY",face:"FC",race:"R",
  swimwear:"SW",socks_shoes:"SK",headwear:"HT",prop:"PR",
  outfit_m:"M",outfit_f:"F",outfit_u:"U",top_m:"MT",bottom_m:"MB",top_f:"FT",bottom_f:"FB",
  accessory:"A",expression:"X",gaze:"G",pose:"P",couple:"C",camera:"V",
  location:"L",element:"E",palette:"PL",lighting:"LT",style:"S",
};

/* ============ 狀態 ============ */
let DATA=[];
let state={group:"all",cat:null,q:"",com:[],subj:"1girl",fav:new Set(),
  rand:new Set(RAND_CATS),lock:new Set()};
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

/* ============ 工具 ============ */
const $=s=>document.querySelector(s);
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
function toast(msg){
  const t=$("#toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),1400);
}
function copyText(txt,msg){
  const done=()=>toast(msg||"已複製 ✓");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(fallback);
  }else fallback();
  function fallback(){
    const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");done()}catch(e){toast("複製失敗")}
    document.body.removeChild(ta);
  }
}
function codeOf(it){return it.t.split(" ")[0]}

/* ============ 導覽渲染 ============ */
function renderNav(){
  $("#groupbar").innerHTML=GROUPS.map(g=>
    `<div class="gtab ${state.group===g.id?"on":""}" data-g="${g.id}">${g.l}</div>`).join("");
  const cats=Object.entries(CATS).filter(([id,c])=>state.group==="all"||c.g===state.group);
  const counts={};DATA.forEach(d=>counts[d.c]=(counts[d.c]||0)+1);
  /* 桌面側欄：依大類分段 */
  let sb=`<div class="sb-title">CATEGORIES</div>`;
  let curG="";
  const groupLabel=id=>(GROUPS.find(g=>g.id===id)||{}).l||"";
  Object.entries(CATS).forEach(([id,c])=>{
    if(state.group!=="all"&&state.group!=="fav"&&c.g!==state.group)return;
    if(state.group==="fav")return;
    if(c.g!==curG){curG=c.g;sb+=`<div class="sb-group">${groupLabel(curG)}</div>`}
    sb+=`<div class="sb-item ${state.cat===id?"on":""}" data-c="${id}">
      <span class="dot" style="background:var(${c.d})"></span>${c.l}
      <span class="n">${counts[id]||0}</span></div>`;
  });
  if(state.group==="fav")sb+=`<div class="sb-group" style="padding-bottom:12px">已收藏的項目</div>`;
  $("#sidebar").innerHTML=sb;
  /* 手機 chips */
  $("#catbar").innerHTML=(state.group==="fav")?"":
    cats.map(([id,c])=>`<div class="chip ${state.cat===id?"on":""}" data-c="${id}">
      <span class="dot" style="background:var(${c.d})"></span>${c.l}</div>`).join("");
}

/* ============ 卡片渲染 ============ */
function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.filter(it=>{
    if(state.group==="fav"&&!state.fav.has(it.id))return false;
    if(state.group!=="all"&&state.group!=="fav"&&CATS[it.c].g!==state.group)return false;
    if(state.cat&&it.c!==state.cat)return false;
    if(q&&!(it.t.toLowerCase().includes(q)||it.p.toLowerCase().includes(q)||(it.n||"").toLowerCase().includes(q)))return false;
    return true;
  });
}
function renderList(){
  const items=filtered();
  $("#count").textContent=`${items.length} RESULTS`;
  $("#list").innerHTML=items.length?items.map(it=>{
    const c=CATS[it.c];
    const inCom=state.com.includes(it.id);
    const faved=state.fav.has(it.id);
    const code=codeOf(it);
    return `<div class="card" data-id="${it.id}">
      <div class="hd">
        <span class="dot" style="background:var(${c.d})"></span>
        <h3>${esc(it.t)}</h3>
        ${it.custom?`<span class="badge-custom">自訂</span>`:""}
        <span class="catlab">${c.l}</span>
        ${it.custom?`<button class="iconbtn" data-act="del" title="刪除">🗑</button>`:""}
        <button class="iconbtn ${faved?"faved":""}" data-act="fav" title="收藏">${faved?"★":"☆"}</button>
        <button class="iconbtn" data-act="copy" title="複製">📋</button>
        <button class="iconbtn ${inCom?"added":""}" data-act="add" title="加入組合">${inCom?"✓":"＋"}</button>
      </div>
      <div class="body">
        <div class="prompt">${esc(it.p)}</div>
        <img class="thumb" data-code="${code}" alt="" loading="lazy" decoding="async">
      </div>
      ${it.n?`<div class="note">💡 ${esc(it.n)}</div>`:""}
    </div>`;
  }).join(""):`<div class="empty">沒有符合的結果</div>`;
  hydrateThumbs();
}
/* ---- 縮圖延遲載入 ----
   捲動到視窗附近才嘗試載圖；副檔名逐一嘗試，
   結果（含「確認無圖」）快取於 IMG_CACHE，重新渲染不再重發請求 */
const IMG_CACHE=Object.create(null); /* code → url字串 或 null(確認無圖) */
/* 注意：.thumb 預設 display:none，隱藏元素不會觸發 IntersectionObserver，
   因此觀察對象是「可見的卡片」，進入視窗後再載入卡片內的縮圖 */
const thumbIO=("IntersectionObserver" in window)?new IntersectionObserver(ens=>{
  ens.forEach(en=>{
    if(!en.isIntersecting)return;
    thumbIO.unobserve(en.target);
    const img=en.target.querySelector(".thumb");
    if(img)loadThumb(img);
  });
},{rootMargin:"400px 0px"}):null;
function hydrateThumbs(){
  document.querySelectorAll("#list .thumb").forEach(img=>{
    const v=IMG_CACHE[img.dataset.code];
    if(v===null)return;                                  /* 已知無圖 */
    if(typeof v==="string"){img.src=v;img.classList.add("loaded");return}
    if(thumbIO)thumbIO.observe(img.closest(".card")||img);else loadThumb(img);
  });
}
function loadThumb(img,i){
  i=i||0;const code=img.dataset.code;
  if(i>=IMG_EXTS.length){IMG_CACHE[code]=null;return}
  const url=IMG_DIR+code+"."+IMG_EXTS[i];
  const probe=new Image();
  probe.onload=()=>{IMG_CACHE[code]=url;img.src=url;img.classList.add("loaded")};
  probe.onerror=()=>loadThumb(img,i+1);
  probe.src=url;
}

/* ============ 組合器 ============ */
function comItems(){
  return state.com.map(id=>DATA.find(d=>d.id===id)).filter(Boolean)
    .sort((a,b)=>CATS[a.c].o-CATS[b.c].o);
}
/* 依結構區塊換行：同分類連續項目同一行，換分類即換行 */
function buildPrompt(){
  const head=[];
  if(state.subj!=="無主體")head.push(state.subj);
  const custom=$("#customtxt").value.trim().replace(/,\s*$/,"");
  if(custom)head.push(custom);
  const lines=[];
  if(head.length)lines.push(head.join(", "));
  let curC=null,buf=[];
  comItems().forEach(it=>{
    if(it.c!==curC&&buf.length){lines.push(buf.join(", "));buf=[]}
    curC=it.c;buf.push(it.p.replace(/,\s*$/,""));
  });
  if(buf.length)lines.push(buf.join(", "));
  return lines.join(",\n");
}
function renderComposer(){
  $("#comcount").textContent=state.com.length;
  $("#subjrow").innerHTML=SUBJECTS.map(s=>
    `<button class="subj ${state.subj===s?"on":""}" data-s="${s}">${s}</button>`).join("");
  const its=comItems();
  $("#rail").innerHTML=its.length?its.map(it=>{
    const lk=state.lock.has(it.id);
    return `<div class="railitem ${lk?"locked":""}">
      <button class="lockbtn ${lk?"locked":""}" data-lk="${it.id}" title="${lk?"解除鎖定":"鎖定：抽取時保留此項"}">${lk?"🔒":""}</button>
      <span class="ord">${CATS[it.c].o}</span>
      <span class="dot" style="background:var(${CATS[it.c].d})"></span>
      <span class="rt">${esc(it.t)}</span>
      ${lk?"":`<button class="rbtn" data-rr="${it.id}" title="同類重抽">🎲</button>`}
      <button class="rbtn" data-rm="${it.id}" title="移除">✕</button>
    </div>`;
  }).join(""):`<div class="railempty">尚未加入模組——在卡片上按「＋」，或用上方 🎲 隨機抽一套</div>`;
  $("#preview").textContent=buildPrompt();
}
function pickRandom(cat,excludeId){
  const pool=DATA.filter(d=>d.c===cat&&d.id!==excludeId);
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
/* ---- 抽取範圍篩選 ---- */
function loadRandCats(){
  try{
    const arr=JSON.parse(lsGet("pp_randcats"));
    if(Array.isArray(arr))state.rand=new Set(arr.filter(c=>CATS[c]));
  }catch(e){}
}
function saveRandCats(){lsSet("pp_randcats",JSON.stringify([...state.rand]))}
function renderFilter(){
  const cats=Object.entries(CATS).sort((a,b)=>a[1].o-b[1].o);
  $("#filterrow").innerHTML=cats.map(([id,c])=>
    `<span class="fchip ${state.rand.has(id)?"on":""}" data-fc="${id}">
      <span class="dot" style="background:var(${c.d})"></span>${c.l}<span class="fpx">${CAT_PREFIX[id]||""}</span>
    </span>`).join("");
  $("#fcount").textContent=state.rand.size+"/"+cats.length;
}
/* 抽已開啟的分類各一；分類中若有 🔒 鎖定項則整類跳過保留 */
function randomSet(){
  let cats=[...state.rand];
  if(!cats.length){toast("請先選擇至少一個分類");return}
  /* 雙人主體：姿勢改抽雙人構圖（若雙人已另行開啟則不重複） */
  if(state.subj.includes("couple")||state.subj==="2girls"||state.subj==="2boys"){
    if(cats.includes("pose")){cats=cats.filter(c=>c!=="pose");if(!cats.includes("couple"))cats.push("couple")}
  }
  let drawn=0,kept=0;
  cats.forEach(cat=>{
    const hasLock=state.com.some(id=>{const d=DATA.find(x=>x.id===id);return d&&d.c===cat&&state.lock.has(id)});
    if(hasLock){kept++;return}
    state.com=state.com.filter(id=>{const d=DATA.find(x=>x.id===id);return d&&d.c!==cat});
    const pick=pickRandom(cat);
    if(pick){state.com.push(pick.id);drawn++}
  });
  renderComposer();renderList();
  toast("已抽取 "+drawn+" 類 🎲"+(kept?"（🔒保留 "+kept+" 類）":""));
}

/* ============ 自訂 Prompt ============ */
function loadCustom(){
  try{
    const arr=JSON.parse(lsGet("pp_custom")||"[]");
    arr.forEach((it,i)=>DATA.push({...it,custom:true,id:"custom-"+i}));
  }catch(e){}
}
function saveCustomList(){
  const arr=DATA.filter(d=>d.custom).map(({c,t,p,n})=>({c,t,p,...(n?{n}:{})}));
  lsSet("pp_custom",JSON.stringify(arr));
}

/* ============ 事件 ============ */
$("#groupbar").addEventListener("click",e=>{
  const g=e.target.dataset.g;if(!g)return;
  state.group=g;state.cat=null;renderNav();renderList();
});
document.addEventListener("click",e=>{
  const c=e.target.closest("[data-c]");
  if(c&&(c.classList.contains("sb-item")||c.classList.contains("chip"))){
    state.cat=(state.cat===c.dataset.c)?null:c.dataset.c;
    renderNav();renderList();
  }
});
let _qTm=null; /* 輸入去抖動：停止輸入 120ms 後才重繪，大量卡片不卡頓 */
$("#q").addEventListener("input",e=>{
  state.q=e.target.value;clearTimeout(_qTm);_qTm=setTimeout(renderList,120);
});
$("#list").addEventListener("click",e=>{
  if(e.target.classList.contains("thumb")){
    $("#lightimg").src=e.target.src;$("#lightbox").classList.add("show");return;
  }
  const card=e.target.closest(".card");if(!card)return;
  const id=card.dataset.id;
  const it=DATA.find(d=>d.id===id);
  const btn=e.target.closest(".iconbtn");
  if(btn){
    const act=btn.dataset.act;
    if(act==="copy")copyText(it.p);
    else if(act==="add"){
      const i=state.com.indexOf(id);
      if(i>=0){state.com.splice(i,1);toast("已從組合移除")}
      else{state.com.push(id);toast("已加入組合 ＋")}
      renderList();renderComposer();
    }else if(act==="fav"){
      if(state.fav.has(id))state.fav.delete(id);else state.fav.add(id);
      lsSet("pp_fav",JSON.stringify([...state.fav]));renderList();
    }else if(act==="del"){
      DATA=DATA.filter(d=>d.id!==id);
      state.com=state.com.filter(x=>x!==id);state.fav.delete(id);
      saveCustomList();renderNav();renderList();renderComposer();toast("已刪除自訂項目");
    }
    return;
  }
  card.classList.toggle("open");
});
$("#lightbox").addEventListener("click",()=>$("#lightbox").classList.remove("show"));
/* 抽屜 */
$("#comfab").addEventListener("click",()=>{renderComposer();$("#drawer").classList.add("show");$("#drawermask").classList.add("show")});
$("#closeDrawer").addEventListener("click",closeDrawer);
$("#drawermask").addEventListener("click",closeDrawer);
function closeDrawer(){$("#drawer").classList.remove("show");$("#drawermask").classList.remove("show")}
$("#clearAll").addEventListener("click",()=>{state.com=[];state.lock.clear();renderComposer();renderList();toast("已清空")});
$("#randbtn").addEventListener("click",randomSet);
$("#filterrow").addEventListener("click",e=>{
  const chip=e.target.closest("[data-fc]");if(!chip)return;
  const id=chip.dataset.fc;
  state.rand.has(id)?state.rand.delete(id):state.rand.add(id);
  saveRandCats();renderFilter();
});
document.querySelectorAll(".fbar [data-fq]").forEach(b=>b.addEventListener("click",()=>{
  const q=b.dataset.fq;
  if(q==="all")state.rand=new Set(Object.keys(CATS));
  else if(q==="none")state.rand=new Set();
  else state.rand=new Set(RAND_CATS);
  saveRandCats();renderFilter();
}));
$("#drawer").addEventListener("click",e=>{
  if(e.target.dataset.lk){
    const id=e.target.dataset.lk;
    state.lock.has(id)?state.lock.delete(id):state.lock.add(id);
    renderComposer();return;
  }
  if(e.target.dataset.rm){
    state.lock.delete(e.target.dataset.rm);
    state.com=state.com.filter(id=>id!==e.target.dataset.rm);renderComposer();renderList();return}
  if(e.target.dataset.rr){
    const old=DATA.find(d=>d.id===e.target.dataset.rr);
    const pick=pickRandom(old.c,old.id);
    if(pick){state.com=state.com.map(id=>id===old.id?pick.id:id);renderComposer();renderList();toast("已重抽 → "+pick.t)}
    return;
  }
  if(e.target.dataset.s){state.subj=e.target.dataset.s;renderComposer()}
});
$("#customtxt").addEventListener("input",()=>{$("#preview").textContent=buildPrompt()});
$("#copyall").addEventListener("click",()=>copyText(buildPrompt(),"完整 Prompt 已複製 ✓"));
/* 新增對話框 */
$("#openAdd").addEventListener("click",()=>{
  $("#ad-cat").innerHTML=Object.entries(CATS).map(([id,c])=>`<option value="${id}">${c.l}（${id}）</option>`).join("");
  $("#addcode").style.display="none";$("#ad-copy").style.display="none";
  $("#ad-title").value="";$("#ad-prompt").value="";$("#ad-note").value="";
  $("#addmask").classList.add("show");
});
$("#ad-cancel").addEventListener("click",()=>$("#addmask").classList.remove("show"));
$("#addmask").addEventListener("click",e=>{if(e.target.id==="addmask")$("#addmask").classList.remove("show")});
$("#ad-save").addEventListener("click",()=>{
  const c=$("#ad-cat").value,t=$("#ad-title").value.trim(),p=$("#ad-prompt").value.trim(),n=$("#ad-note").value.trim();
  if(!t||!p){toast("標題與 Prompt 為必填");return}
  const it={c,t,p,...(n?{n:n}:{}),custom:true,id:"custom-"+Date.now()};
  DATA.push(it);saveCustomList();
  const line=`{c:"${c}",t:"${t.replace(/"/g,'\\"')}",p:"${p.replace(/"/g,'\\"')}"${n?`,n:"${n.replace(/"/g,'\\"')}"`:""}},`;
  $("#addcode").textContent=line;$("#addcode").style.display="block";
  $("#ad-copy").style.display="block";
  $("#ad-copy").onclick=()=>copyText(line,"程式碼已複製，貼進 js/data 對應分類檔即可永久保存");
  renderNav();renderList();toast("已加入（暫存於瀏覽器）");
});

/* ============ 初始化 ============ */
window.initApp=function(){
  /* id 改用唯一代號（如 F31），插入或搬動資料列都不會影響收藏 */
  DATA=window.PROMPT_DATA.map(it=>({...it,id:it.t.split(" ")[0]}));
  loadCustom();
  try{
    let f=JSON.parse(lsGet("pp_fav")||"[]");
    /* 舊版收藏存的是「分類-序號」，透過 js/migrate-fav.js 一次性轉為代號 */
    if(window.LEGACY_ORDER&&f.some(x=>/^(?!custom-)[a-z_]+-\d+$/.test(x))){
      f=f.map(x=>{const m=x.match(/^(?!custom-)[a-z_]+-(\d+)$/);
        return m?(window.LEGACY_ORDER[+m[1]]||x):x});
      lsSet("pp_fav",JSON.stringify(f));
    }
    state.fav=new Set(f);
  }catch(e){}
  loadRandCats();
  renderNav();renderList();renderComposer();renderFilter();
};
</script>
